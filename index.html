<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;background:#f0f2f5;color:#222}
h1{text-align:center;padding:14px 10px 6px;font-size:20px;color:#333}

/* ── Category tabs ── */
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 8px;justify-content:center}
.cat-tab{padding:8px 18px;border-radius:20px;border:2px solid #aaa;background:#fff;
  cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.cat-tab.active{background:#1a56db;color:#fff;border-color:#1a56db}

/* ── Sub tabs ── */
.sub-tabs-row{display:flex;flex-direction:column;align-items:flex-start;gap:6px;padding:6px 12px}
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap}
.sub-tab{padding:6px 16px;border-radius:14px;border:1.5px solid #bbb;background:#fff;
  cursor:pointer;font-size:13px;font-weight:600}
.sub-tab.active{background:#e53935;color:#fff;border-color:#e53935}
.drs-note{font-size:12px;color:#555;border:1px dashed #bbb;border-radius:8px;
  padding:5px 12px;background:#fffde7;white-space:normal;
  width:min(420px,100%);line-height:1.5}

/* ── Filter bar ── */
.filter-bar{display:flex;flex-wrap:wrap;gap:5px;padding:4px 12px 8px}
.filter-btn{padding:4px 12px;border-radius:12px;border:1.5px solid #bbb;background:#fff;
  cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.filter-btn.active{background:#333;color:#fff;border-color:#333}

/* ── Table wrapper ── */
.tbl-wrap{overflow-x:auto;padding:0 8px 16px}
.section-title{font-size:16px;font-weight:700;padding:10px 8px 4px;color:#444}

/* ── Product map table ── */
.pm-table{border-collapse:collapse;table-layout:fixed;width:auto}
.pm-table thead th{
  background:#2c3e50;color:#fff;font-size:13px;font-weight:700;
  padding:7px 6px;text-align:center;border:1px solid #445;white-space:nowrap
}
.pm-table thead th .sub-lbl{font-size:11px;font-weight:400;opacity:.85;display:block}

/* ── Y-label cell ── */
.y-lbl-cell{
  background:#34495e;color:#fff;font-size:13px;font-weight:700;
  writing-mode:horizontal-tb;text-align:center;vertical-align:middle;
  padding:6px 8px;border:1px solid #445;white-space:nowrap;min-width:70px;
  position:sticky;left:0;z-index:2
}
.y-lbl-cell .price-sub{font-size:11px;font-weight:400;opacity:.8;display:block}

/* ── Section header row ── */
.sec-hdr td{
  background:#e8eaf6;color:#333;font-size:14px;font-weight:700;
  padding:7px 12px;border:1px solid #c5cae9;border-left:4px solid #3949ab
}
.sec-hdr .sec-icon{font-size:16px;margin-right:6px}

/* ── Data cell ── */
.pm-table td.data-cell{
  vertical-align:top;padding:5px;border:1px solid #ddd;
  background:#fafafa;min-width:90px
}
.pm-table td.data-cell:hover{background:#f0f4ff}

/* ── Product card ── */
.card{
  display:inline-block;vertical-align:top;
  border-radius:6px;padding:4px 6px;margin:2px;
  cursor:pointer;transition:.15s;font-size:11px;
  min-width:72px;position:relative;white-space:nowrap
}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.25);z-index:2}
.card.drs{border-style:dashed!important;border-width:2px!important}
.card .brand{font-size:11px;font-weight:800;letter-spacing:.3px;display:flex;align-items:center;gap:3px;white-space:nowrap}
.card .model-price{font-size:11px;font-weight:700;line-height:1.2;margin-top:1px;white-space:nowrap}
.card .card-icon{display:inline-flex;align-items:center;opacity:.9}

/* ── Brand colors – light & clear ── */
.SAMSUNG{background:#4A90D9;color:#fff;border:1.5px solid #3A78BE}
.LG{background:#D94068;color:#fff;border:1.5px solid #C03059}
.PANASONIC{background:#3A9ED4;color:#fff;border:1.5px solid #2E88BB}
.TOSHIBA{background:#E05252;color:#fff;border:1.5px solid #C84040}

.AQUA{background:#2AABA0;color:#fff;border:1.5px solid #228C82}

.DAIKIN{background:#3A9ED4;color:#fff;border:1.5px solid #2E88BB}
.MITSUBISHI{background:#A050C8;color:#fff;border:1.5px solid #8840AA}
.GREE{background:#2AABA0;color:#fff;border:1.5px solid #228C82}
.MIDEA{background:#E06060;color:#fff;border:1.5px solid #C84848}
.DEFAULT{background:#7A9AAA;color:#fff;border:1.5px solid #608090}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:8px 12px 4px;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px}
.legend-box{width:14px;height:14px;border-radius:3px;border:1.5px solid #888}
.legend-drs .legend-box{border-style:dashed;border-width:2px;border-color:#333;background:#e0e0e0}

/* ── cat/sub sections ── */
.cat-section{display:none}.cat-section.active{display:block}
.sub-section{display:none}.sub-section.active{display:block}

/* Mobile */
@media(max-width:768px){
  .card{min-width:65px;font-size:12px;padding:4px 5px}
  .card .model{font-size:11px}.card .price{font-size:10px}
  .y-lbl-cell{font-size:12px;min-width:55px}
  .pm-table thead th{font-size:12px}
}
</style>

function brandClass(b){
  const s=b.toUpperCase().replace(/\s+/g,'').replace(/[^A-Z0-9]/g,'');
  const known=['SAMSUNG','LG','PANASONIC','TOSHIBA','SHARP','SONY','TCL','HISENSE',
    'PHILIPS','AQUA','HITACHI','XIAOMI','ELECTROLUX','CASPER','DAIKIN','MITSUBISHI','GREE','MIDEA'];
  return known.find(k=>s.startsWith(k))||'DEFAULT';
}

function fmtPrice(p){
  if(!p) return '';
  const m=p/1e6;
  return m>=1? m.toFixed(1).replace(/\.0$/,'')+'M' : (p/1e3).toFixed(0)+'K';
}

function extractSize(item){
  if(item.cat==='TL'){
    const m=item.m.match(/(\d+(?:\.\d+)?)\s*L\b/i);
    return m?m[1]+'L':null;
  }
  if(item.cat==='MG'){
    if(item.func==='GIATSAY'){
      const m=item.m.match(/GI[ĂẶặă][Tt]\s*(\d+(?:[.,]\d+)?)\s*KG?\s*[-–]\s*S[ẤấAa][Yy]\s*(\d+(?:[.,]\d+)?)\s*KG/i);
      if(m) return m[1]+'KG/'+m[2]+'KG';
    }
    const m=item.m.match(/(\d+(?:[.,]\d+)?)\s*KG/i);
    return m?m[1].replace(',','.')+'KG':null;
  }
  return null;
}

  const code=codeMatch?codeMatch[1]:'?';
  return `<div class="card ${cls}${drs}" onclick="window.open('${item.url}','_blank','noopener')"
    title="${item.b} ${item.m} – ${price}">
    <div class="brand">${brandLine}${icons?'&nbsp;'+icons:''}</div>
    <div class="model-price">${code}</div>
  </div>`;
}

function colW(items, colId){
  let max=0;
  for(const pb of [...PRICE_BANDS].reverse()){
    const n=items.filter(x=>x.r===colId && x.pkg===pb.id).length;
    if(n>max) max=n;
  }
  if(max===0)  return '80px';
  if(max<=2)   return '160px';
  if(max<=4)   return '220px';
  if(max<=8)   return '280px';
  if(max<=12)  return '360px';  // 3-col layout
  return '440px';               // 4-col layout
}

// ── Multi-column wrapper khi cell có nhiều card ───────────────────────────────
// > 8 card → 3 cột | > 12 card → 4 cột  (dùng CSS Grid, không dùng columns)
function wrapCards(cardsHtml, count){
  if(count > 12) return `<div style="display:grid;grid-template-columns:repeat(4,max-content);gap:3px">${cardsHtml}</div>`;
  if(count > 8)  return `<div style="display:grid;grid-template-columns:repeat(3,max-content);gap:3px">${cardsHtml}</div>`;
  return cardsHtml;
}

// ── Standard table (TIVI, HA, TL, MRB) ──────────────────────────────────────
function buildTable(catKey, subset, cols, visColIds){
  const visCols=cols.filter(c=>!visColIds||visColIds.includes(c.id));
  if(!visCols.length) return '<p style="padding:12px;color:#888">Không có sản phẩm.</p>';

  let h=`<div class="tbl-wrap"><table class="pm-table"><thead><tr>
    <th style="min-width:70px;position:sticky;left:0;z-index:3">Giá</th>`;
  for(const c of visCols)
    h+=`<th style="width:${colW(subset,c.id)}">${c.lbl}</th>`;
  h+=`</tr></thead><tbody>`;

  let hasAny=false;
  for(const pb of [...PRICE_BANDS].reverse()){
    const rowItems=subset.filter(x=>x.pkg===pb.id);
    if(!rowItems.length) continue;
    let hasInRow=visCols.some(c=>rowItems.some(x=>x.r===c.id));
    if(!hasInRow) continue;
    hasAny=true;
    h+=`<tr><td class="y-lbl-cell">${pb.lbl}<span class="price-sub">${pb.sub}</span></td>`;
    for(const c of visCols){
      const cellItems=rowItems.filter(x=>x.r===c.id);
      const cards=cellItems.map(makeCard).join('');
      h+=`<td class="data-cell">${wrapCards(cards,cellItems.length)}</td>`;
    }
    h+=`</tr>`;
  }
  if(!hasAny) h+=`<tr><td colspan="${visCols.length+1}" style="padding:16px;color:#888;text-align:center">Không có sản phẩm</td></tr>`;
  h+=`</tbody></table></div>`;
  return h;
}

// ── MG table: sectioned by door type + price bands ──────────────────────────
function buildMGTable(subset, mgFunc, visColIds){
  const cols=mgFunc.cols.filter(c=>!visColIds||visColIds.includes(c.id));
  const visDoors=mgFunc.doors.filter(d=>subset.some(x=>x.door===d.id));
  if(!cols.length||!visDoors.length) return '<p style="padding:12px;color:#888">Không có sản phẩm.</p>';

  let h=`<div class="tbl-wrap"><table class="pm-table"><thead><tr>
    <th style="min-width:70px;position:sticky;left:0;z-index:3">Giá</th>`;
  for(const c of cols) h+=`<th style="width:${colW(subset,c.id)}">${c.lbl}</th>`;
  h+=`</tr></thead><tbody>`;

  let hasAny=false;
  for(const door of visDoors){
    const doorItems=subset.filter(x=>x.door===door.id);
    if(!doorItems.length) continue;
    const colspan=cols.length+1;
    h+=`<tr class="sec-hdr"><td colspan="${colspan}"><span class="sec-icon">${door.icon}</span>${door.lbl}</td></tr>`;
    for(const pb of [...PRICE_BANDS].reverse()){
      const rowItems=doorItems.filter(x=>x.pkg===pb.id);
      if(!rowItems.length) continue;
      let hasInRow=cols.some(c=>rowItems.some(x=>x.r===c.id));
      if(!hasInRow) continue;
      hasAny=true;
      h+=`<tr><td class="y-lbl-cell">${pb.lbl}<span class="price-sub">${pb.sub}</span></td>`;
      for(const c of cols){
        const cellItems=rowItems.filter(x=>x.r===c.id);
        const cards=cellItems.map(makeCard).join('');
        h+=`<td class="data-cell">${wrapCards(cards,cellItems.length)}</td>`;
      }
      h+=`</tr>`;
    }
  }
  if(!hasAny) h+=`<tr><td colspan="${cols.length+1}" style="padding:16px;color:#888;text-align:center">Không có sản phẩm</td></tr>`;
  h+=`</tbody></table></div>`;
  return h;
}

// ── Filter bar ────────────────────────────────────────────────────────────────
function buildFilter(catKey, cols, containerId){
  const allIds=cols.map(c=>c.id);
  visibleCols[catKey]=allIds.slice();
  const bar=document.getElementById(containerId);
  if(!bar||!cols.length) return;
  bar.innerHTML='';

  const btnAll=document.createElement('button');
  btnAll.className='filter-btn active'; btnAll.textContent='Tất cả';
  btnAll.onclick=()=>{
    visibleCols[catKey]=allIds.slice();
    bar.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btnAll.classList.add('active');
    renderCat(catKey);
  };
  bar.appendChild(btnAll);

  for(const c of cols){
    const btn=document.createElement('button');
    btn.className='filter-btn active'; btn.textContent=c.lbl;
    btn.onclick=()=>{
      btn.classList.toggle('active');
      const sel=bar.querySelectorAll('.filter-btn.active:not(:first-child)');
      visibleCols[catKey]=[...sel].map(b=>b.getAttribute('data-col'));
      if(visibleCols[catKey].length===allIds.length) btnAll.classList.add('active');
      else btnAll.classList.remove('active');
      renderCat(catKey);
    };
    btn.setAttribute('data-col',c.id);
    bar.appendChild(btn);
  }
}

function renderCat(catKey){
  const cat=CATS.find(c=>c.id===catKey);
  const sec=document.getElementById('cat-'+catKey);
  if(!sec) return;

  ['bau','drs'].forEach(subId=>{
    const isDrs=subId==='drs';
    const subset=RAW.filter(x=>x.cat===catKey&&x.drs===isDrs);
    const cont=document.getElementById(`sub-${catKey}-${subId}-content`);
    if(!cont) return;

    if(catKey==='MG'){
      let html='';
      for(const mf of MG_FUNCS){
        const mfItems=subset.filter(x=>x.func===mf.id);
        if(!mfItems.length) continue;
        const visC=visibleCols[catKey]||mf.cols.map(c=>c.id);
        html+=`<div class="section-title">${mf.icon} ${mf.lbl} <span style="font-size:12px;color:#888">(${mfItems.length} SP)</span></div>`;
        html+=buildMGTable(mfItems, mf, visC);
      }
      cont.innerHTML=html||'<p style="padding:16px;color:#888">Không có sản phẩm.</p>';
    } else {
      const visC=visibleCols[catKey]||cat.cols.map(c=>c.id);
      cont.innerHTML=buildTable(catKey, subset, cat.cols, visC);
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init(){
  const tabBar=document.getElementById('catTabs');
  const catSec=document.getElementById('catSections');

  CATS.forEach((cat,ci)=>{
    // tab button
    const btn=document.createElement('button');
    btn.className='cat-tab'+(ci===0?' active':'');
    btn.innerHTML=cat.lbl;
    btn.onclick=()=>{
      document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.cat-section').forEach(s=>s.classList.remove('active'));
      document.getElementById('cat-'+cat.id).classList.add('active');
    };
    tabBar.appendChild(btn);

    // cat section
    const catDiv=document.createElement('div');
    catDiv.className='cat-section'+(ci===0?' active':'');
    catDiv.id='cat-'+cat.id;

    // sub tabs
    const subTabsRow=document.createElement('div');
    subTabsRow.className='sub-tabs-row';
    const subTabBar=document.createElement('div');
    subTabBar.className='sub-tabs';
    ['bau','drs'].forEach((subId,si)=>{
      const subLbl=subId==='bau'?'Bán Thường':'DRS – Dropship';
      const sbtn=document.createElement('button');
      sbtn.className='sub-tab'+(si===0?' active':'');
      sbtn.textContent=subLbl;
      sbtn.onclick=()=>{
        subTabBar.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
        sbtn.classList.add('active');
        catDiv.querySelectorAll('.sub-section').forEach(s=>s.classList.remove('active'));
        document.getElementById(`sub-${cat.id}-${subId}`).classList.add('active');
      };
      subTabBar.appendChild(sbtn);
    });
    const drsNote=document.createElement('div');
    drsNote.className='drs-note';
    drsNote.innerHTML='<b>Mã Dropship</b>: Trong tên có <b>DRS</b> &nbsp;|&nbsp; Cọc 10% – Hàng về sau 3–5 ngày &nbsp;|&nbsp; Thưởng bán hàng <b>200K</b>/sản phẩm';
    subTabsRow.appendChild(subTabBar);
    subTabsRow.appendChild(drsNote);
    catDiv.appendChild(subTabsRow);

    // filter bar (only for non-MG or MG kg columns)
    const filterBar=document.createElement('div');
    filterBar.className='filter-bar';
    filterBar.id='filter-'+cat.id;
    catDiv.appendChild(filterBar);

    // sub sections
    ['bau','drs'].forEach((subId,si)=>{
      const subDiv=document.createElement('div');
      subDiv.className='sub-section'+(si===0?' active':'');
      subDiv.id=`sub-${cat.id}-${subId}`;
      const cont=document.createElement('div');
      cont.id=`sub-${cat.id}-${subId}-content`;
      subDiv.appendChild(cont);
      catDiv.appendChild(subDiv);
    });

    catSec.appendChild(catDiv);

    // build filter for this cat (no filter for MG – each sub-table has different cols)
    if(cat.id==='MG'){
      // no filter bar for MG
    } else if(cat.cols.length>1){
      buildFilter(cat.id, cat.cols, 'filter-'+cat.id);
    }

    renderCat(cat.id);
  });
}

init();
</script>
