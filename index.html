<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f0f2f5;font-size:11px;color:#222}
.page{padding:10px 14px}
h1{font-size:15px;font-weight:700;text-align:center;margin-bottom:2px}
.sub{text-align:center;color:#666;font-size:10px;margin-bottom:8px}
.tabs{display:flex;gap:4px;margin-bottom:0}
.tab-btn{padding:6px 16px;border:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;background:#d0d9e8;color:#555;transition:.15s}
.tab-btn.active{background:#fff;color:#1565c0;box-shadow:0 -2px 6px rgba(0,0,0,.1)}
.tab-panel{display:none}.tab-panel.active{display:block}
.legend{display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center;background:#fff;border-radius:0 6px 6px 6px;padding:7px 12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;white-space:nowrap}
.lb{width:18px;height:12px;border-radius:2px;flex-shrink:0}
.lb.drs{border:2px dashed}.lb.solid{border:1.5px solid}
.sep{color:#ccc;font-size:14px;margin:0 2px}
.filter-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;align-items:center}
.filter-bar label{font-size:10.5px;font-weight:700;color:#444;margin-right:2px}
.sz-btn{padding:4px 10px;border:1.5px solid #9dbfe0;border-radius:20px;background:#fff;color:#1a237e;font-size:10.5px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.sz-btn:hover{background:#d6e4f7}
.sz-btn.active{background:#1565c0;color:#fff;border-color:#1565c0}
.chart-outer{overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart-table{border-collapse:collapse;table-layout:fixed;min-width:max-content}
.chart-table thead th{background:#d6e4f7;border:1px solid #9dbfe0;padding:7px 6px;text-align:center;font-size:11px;font-weight:700;color:#1a237e;white-space:nowrap;position:sticky;top:0;z-index:10}
.chart-table thead th small{display:block;font-weight:400;color:#555;font-size:9px;margin-top:1px}
.chart-table thead th.y-hdr{background:#e8edf5;color:#333;width:108px;min-width:108px}
.chart-table tbody tr{border-top:2px solid #c8d0dc}
.chart-table tbody tr:last-child{border-bottom:2px solid #c8d0dc}
.y-lbl-cell{width:108px;min-width:108px;max-width:108px;vertical-align:middle;text-align:center;padding:8px 6px;font-size:19px;font-weight:700;line-height:1.25;color:#1a237e;background:#eef2f9;border-right:3px solid #9dbfe0;white-space:normal}
.data-cell{vertical-align:top;padding:4px;border-left:1px solid #dde4ee}
.band-0 .data-cell{background:rgba(255,240,240,.6)}
.band-1 .data-cell{background:rgba(255,248,240,.6)}
.band-2 .data-cell{background:rgba(255,255,240,.6)}
.band-3 .data-cell{background:rgba(245,252,245,.6)}
.band-4 .data-cell{background:rgba(240,248,255,.7)}
.band-5 .data-cell{background:rgba(245,249,255,.7)}
.band-6 .data-cell{background:rgba(248,255,250,.7)}
.card-wrap{display:flex;flex-wrap:wrap;gap:2px;align-content:flex-start;min-height:20px}

/* Card base */
.card{border-radius:3px;padding:2px 5px;font-size:9px;font-weight:700;
  white-space:nowrap;flex-shrink:0;line-height:1.4;
  cursor:default;position:relative;transition:transform .1s,box-shadow .1s}
.card:hover{z-index:50;white-space:normal;max-width:220px;
  box-shadow:0 3px 12px rgba(0,0,0,.3);transform:scale(1.07)}

/* Clickable card (has URL) */
.card.has-link{cursor:pointer}
.card.has-link::after{
  content:"\2197";position:absolute;top:0;right:1px;
  font-size:7px;opacity:.6;line-height:1
}
.card.has-link:hover::after{opacity:1}

.card .cp{font-weight:400;font-size:8px;opacity:.85;display:block}
.card.drs{border-style:dashed;border-width:2px}
.card.solid{border-style:solid;border-width:1.5px}
.SAMSUNG{background:#dbeeff;border-color:#1565c0;color:#0d47a1}
.LG{background:#ffe0e0;border-color:#c62828;color:#b71c1c}
.TCL{background:#fff3e0;border-color:#e65100;color:#bf360c}
.COOCAA{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20}
.SONY{background:#ede7f6;border-color:#4527a0;color:#311b92}
.AQUA{background:#e0f7fa;border-color:#00838f;color:#006064}
.XIAOMI{background:#f3f3f3;border-color:#616161;color:#212121}

/* Tooltip on hover */
.card[data-url]:hover::before{
  content:attr(title);
  position:absolute;bottom:110%;left:0;
  background:#333;color:#fff;font-size:8px;font-weight:400;
  padding:3px 6px;border-radius:3px;white-space:normal;max-width:220px;
  z-index:100;pointer-events:none;line-height:1.4;
}

@media(max-width:768px){
  .page{padding:6px}h1{font-size:13px}
  .y-lbl-cell{width:68px;min-width:68px;font-size:13px}
  .chart-table thead th.y-hdr{width:68px;min-width:68px}
  .card{font-size:8.5px}.tab-btn{font-size:11px;padding:5px 10px}
  .sz-btn{font-size:10px;padding:3px 8px}
}

</style>

  {id:"10-15M", lb:"10\u201315 tri\u1ec7u"},
  {id:"05-10M", lb:"5\u201310 tri\u1ec7u"},
  {id:"0<5M",   lb:"< 5 tri\u1ec7u"},
];
var visibleCols=COLS.map(function(_,i){return i;});
function fmtP(p){var m=p/1e6;return(m%1===0?m:parseFloat(m.toFixed(1)))+"M";}
function colW(sub,id){
  var mx=0;
  BANDS.forEach(function(b){var n=sub.filter(function(r){return r.r===id&&r.k===b.id;}).length;if(n>mx)mx=n;});
  if(mx<=0)return 88;if(mx<=3)return 122;if(mx<=6)return 182;
  if(mx<=10)return 248;if(mx<=16)return 318;if(mx<=22)return 398;return 472;
}
function applyColVisibility(){
  ["tbl-normal","tbl-drs"].forEach(function(tid){
    var tbl=document.getElementById(tid);if(!tbl)return;
    var ths=tbl.querySelectorAll("thead th");
    var rows=tbl.querySelectorAll("tbody tr");
    COLS.forEach(function(_,i){
      var show=visibleCols.indexOf(i)>=0;
      if(ths[i+1])ths[i+1].style.display=show?"":"none";
      rows.forEach(function(tr){var td=tr.querySelectorAll("td")[i+1];if(td)td.style.display=show?"":"none";});
    });
  });
}
function build(tid,sub){
  var t=document.getElementById(tid);t.innerHTML="";
  var ws=COLS.map(function(c){return colW(sub,c.id);});
  var thead=t.createTHead(),hr=thead.insertRow();
  var t0=document.createElement("th");t0.className="y-hdr";t0.textContent="Gi\xe1";hr.appendChild(t0);
  COLS.forEach(function(col,i){
    var th=document.createElement("th");
    th.style.width=ws[i]+"px";th.style.minWidth=ws[i]+"px";
    th.innerHTML=col.lb+(col.sb?"<small>"+col.sb+"</small>":"");
    hr.appendChild(th);
  });
  var tbody=t.createTBody();
  BANDS.forEach(function(band,bi){
    var tr=tbody.insertRow();tr.className="band-"+bi;
    var yt=document.createElement("td");yt.className="y-lbl-cell";yt.textContent=band.lb;tr.appendChild(yt);
    COLS.forEach(function(col,i){
      var td=document.createElement("td");td.className="data-cell";td.style.width=ws[i]+"px";
      var items=sub.filter(function(r){return r.r===col.id&&r.k===band.id;});
      items.sort(function(a,b){return b.p-a.p;});
      if(items.length){
        var wrap=document.createElement("div");wrap.className="card-wrap";
        items.forEach(function(item){
          var card=document.createElement("div");
          var hasLink=item.u&&item.u.length>0;
          card.className="card "+item.b+" "+(item.n==="DRS"?"drs":"solid")+(hasLink?" has-link":"");
          card.title=item.m+"\n"+fmtP(item.p)+(hasLink?"\n\u2197 Click \u0111\u1ec3 xem tr\xean CPS":"");
          if(hasLink){
            card.setAttribute("data-url",item.u);
            card.addEventListener("click",function(){window.open(item.u,"_blank","noopener");});
          }
          var s=document.createElement("span");s.textContent=item.c;card.appendChild(s);
          var cp=document.createElement("span");cp.className="cp";cp.textContent=fmtP(item.p);card.appendChild(cp);
          wrap.appendChild(card);
        });
        td.appendChild(wrap);
      }
      tr.appendChild(td);
    });
  });
}
function buildFilter(){
  var bar=document.getElementById("filter-bar");
  var allBtn=document.createElement("button");
  allBtn.className="sz-btn active";allBtn.textContent="T\u1ea5t c\u1ea3";
  allBtn.onclick=function(){
    visibleCols=COLS.map(function(_,i){return i;});
    bar.querySelectorAll(".sz-btn").forEach(function(b){b.classList.remove("active");});
    allBtn.classList.add("active");
    applyColVisibility();
  };
  bar.appendChild(allBtn);
  COLS.forEach(function(col,i){
    var btn=document.createElement("button");
    btn.className="sz-btn";btn.textContent=col.lb;
    btn.onclick=function(){
      var idx=visibleCols.indexOf(i);
      if(idx>=0){if(visibleCols.length===1)return;visibleCols.splice(idx,1);btn.classList.remove("active");}
      else{visibleCols.push(i);btn.classList.add("active");}
      allBtn.classList.toggle("active",visibleCols.length===COLS.length);
      applyColVisibility();
    };
    bar.appendChild(btn);
  });
}
var N=RAW.filter(function(r){return r.n!=="DRS";});
var D=RAW.filter(function(r){return r.n==="DRS";});
document.getElementById("ttl").textContent=RAW.length;
document.getElementById("cnt-n").textContent=N.length;
document.getElementById("cnt-d").textContent=D.length;
build("tbl-normal",N);build("tbl-drs",D);
buildFilter();
function switchTab(name,btn){
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active");});
  document.querySelectorAll(".tab-panel").forEach(function(p){p.classList.remove("active");});
  btn.classList.add("active");
  document.getElementById("tab-"+name).classList.add("active");
}

</script>
</body>
